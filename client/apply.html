<!DOCTYPE html>
<html class="h-100">
    <head>
        <title>Apply Tag</title>
        <link rel="icon" href="media/logo-bgc.svg" sizes="any" type="image/svg+xml" />
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <script src="javascript/localStorage.js"></script>
        <script src="javascript/filament.js"></script>
        <script src="javascript/server.js"></script>
        <script src="javascript/nav.js"></script>
        <script src="javascript/nfc.js" defer></script>
        
        <link rel="stylesheet" href="./css/global.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    </head>
    <body class="d-flex flex-column h-100">
        <div id="navPlaceholder">
            <script>insertNav(document.querySelector("#navPlaceholder"), "#nav-apply")</script>
        </div>

        <main class="flex-shrink-0">
            <div class="container">

                <div id="nfc-status">NFC Scanner Disabled</div>
                <button onclick="readNFC()" id="btn-enable-nfc" class="btn btn-primary btn-sm">Enable NFC Scanner</button>

                <p id="error"></p>

                <div class="mb-2">
                    <button id="clearFilamentBtn" class="btn btn-outline-warning btn-sm me-1" hidden
                        onclick="clearActiveTag(); tag = null; updateFilamentDisplay();">
                        Clear Filament Tag
                    </button>
                    <button id="clearSlotBtn" class="btn btn-outline-warning btn-sm" hidden
                        onclick="clearActiveSlot(); activeSlotIDsJSON=null; document.getElementById('clearSlotBtn').hidden=true; document.getElementById('selectedSlotSection').hidden=true;">
                        Clear Slot Tag
                    </button>
                </div>

                <div id="selectedSlotSection" hidden>
                    <h2>Scanned Slot</h2>
                    <div id="selectedSlotName" class="mb-2 text-muted small"></div>
                    <button id="autoApplyBtn" class="btn btn-success btn-lg mb-1">Apply to Scanned Slot</button>
                    <p id="autoApplyStatus" class="mb-0"></p>
                    <br><hr><br>
                </div>

                <h1>Scanned Tag</h1>
                <div id="savedFilamentTag"></div>

                <br>

                <h2>Quick Apply</h2>
                <div id="filamentSlotsQuick"></div>
                <br><hr><br>

                <h2>Available Filament Slots</h2>
                <p>
                    Missing AMS slots?
                    <button class="btn btn-secondary btn-sm" type="button" name="reconnect", onclick="serverPrinterReconnect(); showFilamentSlots()">
                        Force Printer Refresh
                    </button>
                </p>
                
                


                <div id="filamentSlots"></div>

                <div class="alert alert-info error-div collapse.show" role="alert">
                    <span id="slotError"></span>
                </div>

            </div>
        </main>

        <div id="footerPlaceholder">
            <script>insertFooter(document.querySelector("#footerPlaceholder"))</script>
        </div>
    </body>
    
    <script type="text/javascript">
        let tag = parseActiveTag();
        let activeSlotIDsJSON = getActiveSlotIDs();

        const applyBtn = document.getElementById("autoApplyBtn");
        const statusEl = document.getElementById("autoApplyStatus");

        function updateFilamentDisplay() {
            if (tag) {
                const savedFilamentEl = document.querySelector("#savedFilamentTag");
                savedFilamentEl.innerHTML = '';
                tag.display(savedFilamentEl);
                document.getElementById("clearFilamentBtn").hidden = false;
            } else {
                document.querySelector("#savedFilamentTag").innerHTML = '<p class="text-muted">No filament tag scanned.</p>';
                document.getElementById("clearFilamentBtn").hidden = true;
            }
            if (activeSlotIDsJSON != null) {
                applyBtn.hidden = !tag;
            }
        }

        async function doApply() {
            if (!tag) {
                statusEl.innerText = "Error: No filament tag scanned yet.";
                return;
            }
            const origText = applyBtn.innerText;
            applyBtn.innerText = "Applying, please wait 5-10 seconds...";
            applyBtn.disabled = true;
            let result = await setFilamentSlotFromTag(activeSlotIDsJSON);
            applyBtn.disabled = false;
            applyBtn.innerText = origText;
            if (result.error) {
                statusEl.innerText = "Error: " + result.error;
                document.querySelector("#error").innerText = "Error: " + result.error;
                return;
            }
            statusEl.innerText = "Applied successfully!";
            postApplyCleanup();
            showFilamentSlots();
        }

        function setupSlotSection() {
            if (activeSlotIDsJSON == null) return;
            document.getElementById("clearSlotBtn").hidden = false;
            document.getElementById("selectedSlotSection").hidden = false;
            applyBtn.hidden = !tag;
            applyBtn.onclick = doApply;
        }

        // Called by nfc.js when a tag is scanned while on this page
        function onNFCTagScanned(type, tagObj) {
            if (type === 'filament') {
                tag = tagObj;
                updateFilamentDisplay();
                if (activeSlotIDsJSON != null && !getRequireApplyConfirmation()) {
                    doApply();
                }
            } else if (type === 'slot') {
                activeSlotIDsJSON = JSON.stringify(tagObj.ids);
                setupSlotSection();
                showFilamentSlots();
                if (tag != null && !getRequireApplyConfirmation()) {
                    doApply();
                }
            }
        }

        // Initialize
        updateFilamentDisplay();
        setupSlotSection();
        if (activeSlotIDsJSON != null && !getRequireApplyConfirmation() && tag) {
            doApply();
        }

        function postApplyCleanup() {
            if (getClearFilamentAfterApply()) {
                clearActiveTag();
                tag = null;
                document.getElementById("clearFilamentBtn").hidden = true;
                document.getElementById("autoApplyBtn").hidden = true;
                document.querySelector("#savedFilamentTag").innerHTML = '<p class="text-muted">No filament tag scanned.</p>';
            }
            if (getClearSlotAfterApply()) {
                clearActiveSlot();
                activeSlotIDsJSON = null;
                document.getElementById("selectedSlotSection").hidden = true;
                document.getElementById("clearSlotBtn").hidden = true;
            }
        }

        async function showFilamentSlots() {
            //Clear any existing slot data
            document.querySelector("#filamentSlots").innerHTML = "";
            document.querySelector("#filamentSlotsQuick").innerHTML = "";

            var errorBox = document.querySelector("#slotError");
            var errorParent = errorBox.parentElement;
            errorParent.classList.remove("alert-warning", "collapse");
            errorParent.classList.add("collapse.show", "alert-info");
            errorBox.innerText = "Querying server for slot data, please wait...";

            let slotData = await getSlots();

            try {
                //Display slot data
                let scannedSlotResolved = false;
                slotData.slots.forEach((slot, i) => {
                    let slotObj = new FilamentSlot(
                        slot.ids,
                        slot.displayID,
                        slotData.displayKeys,
                        slotData.colorHexKeys,
                        slot //all data for the slot
                    );

                    // If this slot matches the scanned slot tag, show its name
                    if (activeSlotIDsJSON != null &&
                        JSON.stringify(slot.ids) === JSON.stringify(JSON.parse(activeSlotIDsJSON))) {
                        document.getElementById("selectedSlotName").innerText = slotObj.displayID;
                        scannedSlotResolved = true;
                    }

                    errorParent.classList.add("collapse");
                    slotObj.displayQuick(document.querySelector("#filamentSlotsQuick"));
                    slotObj.display(document.querySelector("#filamentSlots"));
                });

                if (activeSlotIDsJSON != null && !scannedSlotResolved) {
                    document.getElementById("selectedSlotName").innerText = "Could not resolve slot name from printer data";
                    document.getElementById("selectedSlotName").style.color = "red";
                }

            } catch (e) {
                try {
                    //See if server sent an explicit error
                    var err = slotData.error;
                } catch (e2) {
                    //unexpected server response
                    err = e.message; //want the first exception info
                }
                errorBox.innerText = err;
                errorParent.classList.remove("alert-info", "collapse");
                errorParent.classList.add("alert-warning", "collapse.show");
                console.log(slotData);
                return;
            }
        }
        showFilamentSlots();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
</html>
